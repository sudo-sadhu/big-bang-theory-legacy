<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cast & Crew - The Big Bang Theory Fan Website</title>
    <meta name="description" content="Meet the cast and crew of The Big Bang Theory. Character bios, actor details, and production team information.">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="stars-bg"></div>
    <div id="nav-placeholder"></div>

    <header class="page-hero">
        <div class="container">
            <h1 class="page-hero-title reveal">Cast & Crew</h1>
            <p class="page-hero-subtitle reveal reveal-delay-1">The brilliant minds who brought the universe of The Big Bang Theory to life, both on screen and behind the scenes.</p>
        </div>
    </header>

    <section class="section section-dark">
        <div class="container">
            <div class="category-header reveal">
                <h2>Main Cast</h2>
                <span class="category-count">8 Characters</span>
            </div>
            
            <div class="grid grid-auto-fit reveal" id="main-cast-container">
                <!-- Generated by JS -->
            </div>

            <div class="divider"></div>

            <div class="category-header reveal">
                <h2>Recurring Characters & Guest Stars</h2>
            </div>
            
            <div class="crew-grid reveal" id="recurring-cast-container">
                <!-- Generated by JS -->
            </div>

            <div class="divider"></div>

            <div class="category-header reveal">
                <h2>The Creative Team</h2>
            </div>
            
            <div class="crew-grid reveal" id="crew-container">
                <!-- Generated by JS -->
            </div>
        </div>
    </section>

    <!-- Character Modal -->
    <div class="modal-overlay" id="character-modal">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <div class="back-to-top">↑</div>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('nav-placeholder').innerHTML = getNavHTML('cast');
            document.getElementById('footer-placeholder').innerHTML = getFooterHTML();
            initNavigation();

            // Fetch official TVMaze cast images
            fetch('https://api.tvmaze.com/shows/66/cast')
                .then(res => res.json())
                .then(data => {
                    // Create a mapping of actor name to image URL
                    const tvmazeImages = {};
                    data.forEach(c => {
                        if (c.person.image) {
                            tvmazeImages[c.person.name] = c.person.image.original || c.person.image.medium;
                        }
                    });

                    // Attach to MAIN_CAST
                    MAIN_CAST.forEach(char => {
                        if (tvmazeImages[char.actor]) {
                            char.officialImage = tvmazeImages[char.actor];
                        }
                    });

                    renderMainCast();
                    renderRecurringCast();
                    renderCrew();
                })
                .catch(err => {
                    console.error('Error fetching TVMaze cast:', err);
                    // Fallback to initial render if fetch fails
                    renderMainCast();
                    renderRecurringCast();
                    renderCrew();
                });

            // Modal outside click
            document.getElementById('character-modal').addEventListener('click', (e) => {
                if(e.target.id === 'character-modal') closeModal();
            });
        });

        function renderMainCast() {
            const container = document.getElementById('main-cast-container');
            container.innerHTML = '';
            
            MAIN_CAST.forEach((char, index) => {
                const delay = Math.min(index * 0.1, 0.5);
                const bgStyle = char.officialImage 
                    ? `background-image: url('${char.officialImage}'); background-size: cover; background-position: center top;`
                    : `background-image: url('images/${char.id}.jpg'); background-size: cover; background-position: center;`;

                const html = `
                    <div class="card cast-card" style="animation: fadeInUp 0.5s ease ${delay}s both; cursor: pointer;" onclick="openCharacterModal('${char.id}')">
                        <div class="cast-avatar" style="${bgStyle} border-color: ${char.color}; box-shadow: 0 0 0 3px var(--bg-deep), 0 0 0 5px ${char.color};"></div>
                        <h3 class="cast-character">${char.character}</h3>
                        <p class="cast-actor">Played by ${char.actor}</p>
                        <p class="cast-quote">"${char.catchphrase}"</p>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function renderRecurringCast() {
            const container = document.getElementById('recurring-cast-container');
            RECURRING_CAST.forEach(person => {
                const html = `
                    <div class="crew-item">
                        <div class="crew-avatar">⭐</div>
                        <div>
                            <div class="crew-name">${person.actor}</div>
                            <div class="crew-role">${person.character} (${person.role})</div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function renderCrew() {
            const container = document.getElementById('crew-container');
            CREW.forEach(person => {
                const html = `
                    <div class="crew-item" data-tooltip="${person.note}">
                        <div class="crew-avatar">🎬</div>
                        <div>
                            <div class="crew-name">${person.name}</div>
                            <div class="crew-role">${person.role}</div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function openCharacterModal(charId) {
            const char = MAIN_CAST.find(c => c.id === charId);
            if(!char) return;

            const bgStyle = char.officialImage 
                ? `background-image: url('${char.officialImage}'); background-size: cover; background-position: center top;`
                : `background-image: url('images/${char.id}.jpg'); background-size: cover; background-position: center;`;

            const modalContent = document.getElementById('modal-content');
            modalContent.innerHTML = `
                <div class="text-center mb-lg">
                    <div class="cast-avatar mx-auto mb-md" style="${bgStyle} box-shadow: 0 0 0 3px var(--bg-deep), 0 0 0 5px ${char.color}, 0 0 30px ${char.color}40;"></div>
                    <h2 class="font-display" style="font-size: 2rem; margin-bottom: 0.5rem; color: ${char.color};">${char.character}</h2>
                    <p class="text-secondary" style="font-size: 1.1rem;">Played by ${char.actor}</p>
                </div>
                
                <div class="grid grid-2 mb-xl">
                    <div>
                        <div class="text-muted" style="font-size: 0.8rem; text-transform: uppercase;">Role / Profession</div>
                        <div class="font-heading" style="font-weight: 600;">${char.role}</div>
                    </div>
                    <div>
                        <div class="text-muted" style="font-size: 0.8rem; text-transform: uppercase;">Seasons</div>
                        <div class="font-heading" style="font-weight: 600;">${char.seasons}</div>
                    </div>
                </div>

                <div class="mb-xl">
                    <h3 class="font-heading mb-sm">Biography</h3>
                    <p class="text-secondary" style="line-height: 1.7;">${char.bio}</p>
                </div>

                <div class="mb-xl">
                    <h3 class="font-heading mb-sm">Key Traits</h3>
                    <div class="flex flex-wrap gap-sm">
                        ${char.traits.map(t => `<span class="tag" style="background: ${char.color}20; color: ${char.color};">${t}</span>`).join('')}
                    </div>
                </div>

                <div style="padding: 1rem; background: rgba(255,215,0,0.05); border-left: 3px solid var(--accent-gold); border-radius: 4px;">
                    <strong class="text-gold">Fun Fact:</strong> <span class="text-secondary">${char.funFact}</span>
                </div>
            `;

            document.getElementById('character-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('character-modal').classList.remove('active');
        }
    </script>
</body>
</html>
