<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episodes - The Big Bang Theory Fan Website</title>
    <meta name="description" content="Complete episode guide for The Big Bang Theory. Browse all 12 seasons, read descriptions, and find trivia.">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="stars-bg"></div>
    <div id="nav-placeholder"></div>

    <header class="page-hero">
        <div class="container">
            <h1 class="page-hero-title reveal">Episode Guide</h1>
            <p class="page-hero-subtitle reveal reveal-delay-1">Explore the complete database of all 279 episodes across 12 amazing seasons.</p>
        </div>
    </header>

    <section class="section section-dark">
        <div class="container">
            <!-- Search & Filters -->
            <div class="search-bar reveal" style="display: flex; gap: 1rem; max-width: 800px; margin: 0 auto 2rem;">
                <div style="position: relative; flex: 1;">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="episode-search" class="search-input" placeholder="Search episodes, descriptions, or trivia...">
                </div>
                <select id="sort-select" class="search-input" style="width: auto; padding-left: 1rem; cursor: pointer;">
                    <option value="ep-asc">Sort by Episode Order</option>
                    <option value="imdb-desc">Sort by IMDb Rating (High to Low)</option>
                    <option value="imdb-asc">Sort by IMDb Rating (Low to High)</option>
                </select>
            </div>

            <div class="season-tabs reveal" id="season-tabs">
                <!-- Tabs generated by JS -->
            </div>

            <div id="episodes-container" class="grid grid-auto-fill reveal">
                <!-- Episodes generated by JS -->
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <div class="back-to-top">↑</div>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('nav-placeholder').innerHTML = getNavHTML('episodes');
            document.getElementById('footer-placeholder').innerHTML = getFooterHTML();
            initNavigation();
            
            let currentSeason = 1;
            const container = document.getElementById('episodes-container');
            const tabsContainer = document.getElementById('season-tabs');
            const searchInput = document.getElementById('episode-search');
            const sortSelect = document.getElementById('sort-select');
            
            // Map to store TVMaze image URLs (e.g. "S1E1": "http...")
            const episodeImages = {};
            let isFetchingImages = true;

            // Fetch TVMaze episode data
            fetch('https://api.tvmaze.com/shows/66/episodes')
                .then(res => res.json())
                .then(data => {
                    data.forEach(ep => {
                        if(ep.image && ep.image.medium) {
                            episodeImages[`S${ep.season}E${ep.number}`] = ep.image.medium;
                        }
                    });
                    isFetchingImages = false;
                    renderEpisodes(); // Re-render once images are loaded
                })
                .catch(err => {
                    console.error('Error fetching TVMaze episodes:', err);
                    isFetchingImages = false;
                });

            // Render Tabs
            for(let i = 1; i <= 12; i++) {
                const tab = document.createElement('button');
                tab.className = `season-tab ${i === 1 ? 'active' : ''}`;
                tab.textContent = `Season ${i}`;
                tab.onclick = () => {
                    document.querySelectorAll('.season-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentSeason = i;
                    renderEpisodes();
                    searchInput.value = ''; // clear search on tab change
                };
                tabsContainer.appendChild(tab);
            }

            function renderEpisodes(filteredEpisodes = null) {
                container.innerHTML = '';
                let episodesToRender = filteredEpisodes || [...EPISODES[currentSeason]];
                
                // Apply sorting
                const sortValue = sortSelect.value;
                if (sortValue === 'imdb-desc') {
                    episodesToRender.sort((a, b) => b.rating - a.rating);
                } else if (sortValue === 'imdb-asc') {
                    episodesToRender.sort((a, b) => a.rating - b.rating);
                } else {
                    // Default episode order (usually by ep number, or season then ep number)
                    episodesToRender.sort((a, b) => {
                        if (a.season && b.season && a.season !== b.season) {
                            return a.season - b.season;
                        }
                        return a.ep - b.ep;
                    });
                }
                
                if (episodesToRender.length === 0) {
                    container.innerHTML = '<p class="text-center text-muted" style="padding: 2rem; grid-column: 1 / -1;">No episodes found matching your search.</p>';
                    return;
                }

                episodesToRender.forEach((ep, index) => {
                    const delay = Math.min(index * 0.1, 0.5);
                    const epSeason = ep.season || currentSeason; // default to current season if search doesn't provide it
                    const imgUrl = episodeImages[`S${epSeason}E${ep.ep}`] || 'images/hero-banner.jpg'; // fallback image
                    
                    const epHtml = `
                        <div class="card episode-card" style="animation: fadeInUp 0.5s ease ${delay}s both; flex-direction: column; padding: 0; overflow: hidden; gap: 0;">
                            <div style="width: 100%; height: 200px; background-image: url('${imgUrl}'); background-size: cover; background-position: center; position: relative;">
                                <div class="episode-number" style="position: absolute; top: 1rem; left: 1rem; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); color: var(--accent-gold); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; border: 1px solid rgba(255,215,0,0.3);">${ep.ep}</div>
                            </div>
                            <div class="episode-info" style="padding: 1.5rem;">
                                <h3 class="episode-title" style="margin-bottom: 0.5rem; font-family: var(--font-heading); font-size: 1.1rem; line-height: 1.4;">${ep.title}</h3>
                                <div class="episode-meta" style="margin-bottom: 1rem; font-size: 0.85rem; display: flex; justify-content: space-between; color: var(--text-muted);">
                                    <span>📅 ${ep.date}</span>
                                    <span class="rating-imdb" style="color: var(--accent-gold);">⭐ ${ep.rating} / 10</span>
                                </div>
                                <p class="episode-desc" style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6;">${ep.desc}</p>
                                ${ep.trivia ? `<div class="episode-trivia" style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--glass-border); font-size: 0.85rem; color: var(--text-muted);"><i>Trivia: ${ep.trivia}</i></div>` : ''}
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', epHtml);
                });
            }

            // Search functionality
            searchInput.addEventListener('input', debounce((e) => {
                const term = e.target.value.toLowerCase();
                if (!term) {
                    renderEpisodes(); // reset to current season
                    return;
                }

                // Search across all seasons
                let results = [];
                for(let season in EPISODES) {
                    EPISODES[season].forEach(ep => {
                        const searchableText = `${ep.title} ${ep.desc} ${ep.trivia || ''} S${season}E${ep.ep}`.toLowerCase();
                        if(searchableText.includes(term)) {
                            results.push({...ep, season}); // attach season for reference if needed
                        }
                    });
                }
                
                // Clear active tabs visually since we are searching globally
                document.querySelectorAll('.season-tab').forEach(t => t.classList.remove('active'));
                renderEpisodes(results);
            }, 300));

            // Sort functionality
            sortSelect.addEventListener('change', () => {
                const term = searchInput.value.toLowerCase().trim();
                if (term) {
                    // Re-trigger search to apply sort to search results
                    searchInput.dispatchEvent(new Event('input'));
                } else {
                    // Just re-render current season with new sort
                    renderEpisodes();
                }
            });

            // Initial render
            renderEpisodes();
        });
    </script>
</body>
</html>
